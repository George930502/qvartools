# Classical vs Quantum Circuit SKQD --- Side-by-side comparison
#
# Runs both Krylov basis generators on the same molecule with
# matched parameters.

molecule: h2

# Shared Krylov parameters
max_krylov_dim: 10
total_evolution_time: 3.14159265  # pi
shots: 100000

# Quantum generator Trotter parameters
num_trotter_steps: 8
trotter_order: 2

# Backend for quantum generator
backend: auto

device: auto
